spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/local_db
    username: local_user
    password: local_password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  docker:
    compose:
      enabled: true
  web:
    error:
      include-stacktrace: never
      include-binding-errors: always
  data:
    redis:
      host: localhost
      port: 6379
logging:
  level:
    root: INFO
    dev.guilhermeluan: DEBUG

server:
  tomcat:
    threads:
      max: 20


